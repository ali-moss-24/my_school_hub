{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySchoolHub</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f0ff;
            margin: 0;
            padding: 0;
            text-align: center;

            /* makes footer stick to the bottom*/
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            background: linear-gradient(
                135deg,
                #f5e8ff, /* soft lilac */
                #e8f0ff, /* soft blue */
                #e8fff0 /* soft mint */
            );
             border-bottom: 2px solid rgba(122, 60, 230, 0.4); /* soft purple line */
        }

        img.logo {
            width: 300px;
            height: auto;
            max-width: 80%;
            border-radius: 50px;
        }

        h1 {
            color: #2A6FEE; /* Blue from your branding */
            margin-top: 10px;
        }

        p.tagline {
            color: #555;
            font-size: 1.1rem;
            margin-top: -10px;
        }

        .menu {
            margin-top: 50px;
        }

        .menu a {
            display: block;
            margin: 15px auto;
            padding: 15px 25px;
            width: 250px;
            background-color: #2A6FEE;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
        }

        .menu a:hover {
            background-color: #1f54b8;
        }

        /* footer styling */
        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
        }

       
    </style>
</head>

<body>

    <header>
    
        <img src="{% static 'mealshub/logo.png' %}" alt="Mealshub Logo" class="logo">
     
    </header>

    <div class="menu">
        <a href="#">MealsHub</a>
        <a href="#">AttendanceHub</a>
        <a href="#">SafeGuardHub</a>
        <a href="#">CommsHub</a>
        <a href="#">UniformHub</a>
    </div>

    <a href="/menu/1/"
        style="display:inline-block; padding:10px 20px; background: #4CAF50; color:white;
        text-decoration:none; border-radius:6px; font-size:18px;">
        View This Week's Menu
    </a>
</body>

<footer>
   <p class="tagline">Connect · Learn · Grow</p>
</footer>
</html>
