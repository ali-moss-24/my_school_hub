{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySchoolHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f0ff;
            margin: 0;
            padding: 0;
            text-align: center;

            /* makes footer stick to the bottom*/
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            background: linear-gradient(
                135deg,
                #f5e8ff, /* soft lilac */
                #e8f0ff, /* soft blue */
                #e8fff0 /* soft mint */
            );
             border-bottom: 2px solid rgba(122, 60, 230, 0.4); /* soft purple line */
        }

        img.logo {
            width: 300px;
            height: auto;
            max-width: 80%;
            border-radius: 50px;
        }

        h1 {
            color: #2A6FEE; /* Blue from your branding */
            margin-top: 10px;
        }

        p.tagline {
            color: #555;
            font-size: 1.1rem;
            margin-top: -10px;
        }

        .menu {
            margin-top: 50px;
        }

        .menu a {
            display: block;
            margin: 15px auto;
            padding: 15px 25px;
            width: 250px;
            background-color: #2A6FEE;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
        }

        .menu a:hover {
            background-color: #1f54b8;
        }

        a.coming-soon {
            background-color: #bfc8d6; /* soft grey-blue */
            color: #555;
            cursor: default;
            pointer-events: none; /* disables clicking */
        }

        a.coming-soon span {
            font-size: 0.9rem;
            color: #777;
            margin-right: 5px;
        }

        /* Remove hover effect for coming soon button*/
        a.coming-soon:hover {
            background-color: #bfc8d6;
        }

        .menu a i {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        /* footer styling */
        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
        }

       
    </style>
</head>

<body>

    <header>
    
        <img src="{% static 'mealshub/logo.png' %}" alt="Mealshub Logo" class="logo">
     
    </header>

    <div class="menu">
        <a href="/menu/1/"><i class="fa-solid fa-utensils"></i> MealsHub</a>

        <a class="coming-soon"><i class="fa-solid fa-clipboard-check"></i> AttendanceHub <span>(coming soon)</span></a>
        <a class="coming-soon"><i class="fa-solid fa-shield-heart"></i>SafeGuardHub <span>(coming soon)</span></a>
        <a class="coming-soon"><i class="fa-solid fa-comments"></i>CommsHub <span>(coming soon)</span></a>
        <a class="coming-soon"><i class="fa-solid fa-shirt"></i>UniformHub <span>(coming soon)</span></a>
    </div>

</body>

<footer>
   <p class="tagline">Connect · Learn · Grow</p>
</footer>
</html>
