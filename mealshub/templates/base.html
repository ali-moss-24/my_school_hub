<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Meals Hub</title>

    <style>

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px 16px;
        }


        th {
            background: #f2f2f2;
            text-align: left;
         }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
            color: #333;
            display: inline-block;
            padding: 8px 0;
            font-size: 1.1rem;
        }

        nav a:hover {
            color: #007bff;
        }

        select, button, input {
            padding: 10px;
            font-size: 1rem;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'orders_list' %}">View Orders</a>
    </nav>
</header>

{% block content %}
{% endblock %}

</body>
</html>
